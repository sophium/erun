{{- $worktreeStorage := default "host" .Values.worktreeStorage -}}
{{- $worktreeRepoName := required "worktreeRepoName is required" .Values.worktreeRepoName -}}
{{- $worktreePath := printf "/home/erun/git/%s" $worktreeRepoName -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: __MODULE_NAME__-home
  labels:
    app: __MODULE_NAME__
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: __MODULE_NAME__-docker
  labels:
    app: __MODULE_NAME__
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: __MODULE_NAME__
  labels:
    app: __MODULE_NAME__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: __MODULE_NAME__
  labels:
    app: __MODULE_NAME__
subjects:
  - kind: ServiceAccount
    name: __MODULE_NAME__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __MODULE_NAME__
  labels:
    app: __MODULE_NAME__
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: __MODULE_NAME__
  replicas: 1
  template:
    metadata:
      labels:
        app: __MODULE_NAME__
    spec:
      automountServiceAccountToken: true
      serviceAccountName: __MODULE_NAME__
      securityContext:
        fsGroup: 1000
      containers:
        - image: erunpaas/erun-devops:{{ .Chart.AppVersion }}
          name: __MODULE_NAME__
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /home/erun
            - name: KUBECONFIG
              value: /home/erun/.kube/config
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: ERUN_REPO_PATH
              value: {{ $worktreePath | quote }}
            - name: ERUN_REPO_REMOTE
              value: {{ if eq $worktreeStorage "pvc" }}"true"{{ else }}"false"{{ end }}
            - name: ERUN_KUBERNETES_CONTEXT
              value: in-cluster
            - name: ERUN_TENANT
              value: {{ required "tenant is required" .Values.tenant | quote }}
            - name: ERUN_ENVIRONMENT
              value: {{ required "environment is required" .Values.environment | quote }}
            - name: ERUN_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            limits:
              cpu: "4"
              memory: "8916Mi"
            requests:
              cpu: "0.25"
              memory: "1024Mi"
          volumeMounts:
            - name: erun-home
              mountPath: /home/erun
{{- if eq $worktreeStorage "host" }}
            - name: repo-worktree
              mountPath: {{ $worktreePath | quote }}
{{- end }}
            - name: docker-socket
              mountPath: /var/run
        - image: erunpaas/erun-dind:28.1.1
          name: erun-dind
          imagePullPolicy: IfNotPresent
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - docker info >/dev/null 2>&1
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -lc
                  - while [ ! -S /var/run/docker.sock ]; do sleep 1; done; chmod 0666 /var/run/docker.sock
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-state
              mountPath: /var/lib/docker
      volumes:
        - name: erun-home
          persistentVolumeClaim:
            claimName: __MODULE_NAME__-home
{{- if eq $worktreeStorage "host" }}
        - name: repo-worktree
          hostPath:
            path: {{ required "worktreeHostPath is required" .Values.worktreeHostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
        - name: docker-socket
          emptyDir: {}
        - name: docker-state
          persistentVolumeClaim:
            claimName: __MODULE_NAME__-docker
      restartPolicy: Always
