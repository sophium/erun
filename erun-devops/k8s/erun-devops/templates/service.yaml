{{- $mcpPort := default 17000 .Values.mcpPort -}}
{{- $apiPort := default 17033 .Values.apiPort -}}
{{- $sshPort := default 17022 .Values.sshPort -}}
{{- $idle := default dict .Values.idle -}}
{{- $idleTimeout := default "5m0s" $idle.timeout -}}
{{- $idleWorkingHours := default "08:00-20:00" $idle.workingHours -}}
{{- $idleTrafficBytes := default 0 $idle.trafficBytes -}}
{{- $runtime := default dict .Values.runtime -}}
{{- $runtimeResources := default dict $runtime.resources -}}
{{- $runtimeLimits := default dict $runtimeResources.limits -}}
{{- $runtimeRequests := default dict $runtimeResources.requests -}}
{{- $runtimeCPU := default "4" $runtimeLimits.cpu -}}
{{- $runtimeMemory := default "8916Mi" $runtimeLimits.memory -}}
{{- $runtimeRequestCPU := default "0.25" $runtimeRequests.cpu -}}
{{- $runtimeRequestMemory := default "1024Mi" $runtimeRequests.memory -}}
{{- $managedCloud := default false .Values.managedCloud -}}
{{- $cloudContext := default dict .Values.cloudContext -}}
{{- $cloudContextName := default "" $cloudContext.name -}}
{{- $cloudProviderAlias := default "" $cloudContext.providerAlias -}}
{{- $cloudRegion := default "" $cloudContext.region -}}
{{- $cloudInstanceID := default "" $cloudContext.instanceId -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erun-devops-home
  labels:
    app: erun-devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erun-devops-docker
  labels:
    app: erun-devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: erun-devops
  labels:
    app: erun-devops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: erun-devops
  labels:
    app: erun-devops
subjects:
  - kind: ServiceAccount
    name: erun-devops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
{{- if eq (required "environment is required" .Values.environment) "local" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: erun-devops-namespace-manager
  labels:
    app: erun-devops
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: erun-devops
  labels:
    app: erun-devops
subjects:
  - kind: ServiceAccount
    name: erun-devops
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: erun-devops-namespace-manager
  labels:
    app: erun-devops
subjects:
  - kind: ServiceAccount
    name: erun-devops
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: erun-devops-namespace-manager
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erun-devops
  labels:
    app: erun-devops
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: erun-devops
  replicas: 1
  template:
    metadata:
      labels:
        app: erun-devops
    spec:
      automountServiceAccountToken: true
      serviceAccountName: erun-devops
      securityContext:
        fsGroup: 1000
      initContainers:
        - image: tonistiigi/binfmt:qemu-v10.0.4-56
          name: install-binfmt
          imagePullPolicy: IfNotPresent
          args:
            - --install
            - amd64,arm64
          securityContext:
            privileged: true
      containers:
        - image: erunpaas/erun-devops:{{ .Chart.AppVersion }}
          name: erun-devops
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /home/erun
            - name: KUBECONFIG
              value: /home/erun/.kube/config
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: ERUN_REPO_PATH
              value: {{ printf "/home/erun/git/%s" (base (required "worktreeHostPath is required" .Values.worktreeHostPath)) | quote }}
            - name: ERUN_REPO_REMOTE
              value: "false"
            - name: ERUN_CLOUD_ENVIRONMENT
              value: {{ if $managedCloud }}"true"{{ else }}"false"{{ end }}
            - name: ERUN_CLOUD_CONTEXT_NAME
              value: {{ $cloudContextName | quote }}
            - name: ERUN_CLOUD_PROVIDER_ALIAS
              value: {{ $cloudProviderAlias | quote }}
            - name: ERUN_CLOUD_REGION
              value: {{ $cloudRegion | quote }}
            - name: ERUN_CLOUD_INSTANCE_ID
              value: {{ $cloudInstanceID | quote }}
            - name: ERUN_KUBERNETES_CONTEXT
              value: in-cluster
            - name: ERUN_TENANT
              value: {{ required "tenant is required" .Values.tenant | quote }}
            - name: ERUN_ENVIRONMENT
              value: {{ required "environment is required" .Values.environment | quote }}
            - name: ERUN_SSHD_ENABLED
              value: {{ if .Values.sshdEnabled }}"true"{{ else }}"false"{{ end }}
            - name: ERUN_MCP_PORT
              value: {{ $mcpPort | quote }}
            - name: ERUN_API_PORT
              value: {{ $apiPort | quote }}
            - name: ERUN_SSHD_PORT
              value: {{ $sshPort | quote }}
            - name: ERUN_IDLE_TIMEOUT
              value: {{ $idleTimeout | quote }}
            - name: ERUN_IDLE_WORKING_HOURS
              value: {{ $idleWorkingHours | quote }}
            - name: ERUN_IDLE_TRAFFIC_BYTES
              value: {{ $idleTrafficBytes | quote }}
            - name: ERUN_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: {{ $mcpPort }}
              name: mcp
            - containerPort: {{ $apiPort }}
              name: api
            - containerPort: {{ $sshPort }}
              name: ssh
          resources:
            limits:
              cpu: {{ $runtimeCPU | quote }}
              memory: {{ $runtimeMemory | quote }}
            requests:
              cpu: {{ $runtimeRequestCPU | quote }}
              memory: {{ $runtimeRequestMemory | quote }}
          volumeMounts:
            - name: erun-home
              mountPath: /home/erun
            - name: repo-worktree
              mountPath: {{ printf "/home/erun/git/%s" (base (required "worktreeHostPath is required" .Values.worktreeHostPath)) | quote }}
            - name: docker-socket
              mountPath: /var/run
        - image: erunpaas/erun-dind:28.1.1
          name: erun-dind
          imagePullPolicy: IfNotPresent
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - docker info >/dev/null 2>&1
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -lc
                  - while [ ! -S /var/run/docker.sock ]; do sleep 1; done; chmod 0666 /var/run/docker.sock
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-state
              mountPath: /var/lib/docker
      volumes:
        - name: erun-home
          persistentVolumeClaim:
            claimName: erun-devops-home
        - name: repo-worktree
          hostPath:
            path: {{ required "worktreeHostPath is required" .Values.worktreeHostPath | quote }}
            type: DirectoryOrCreate
        - name: docker-socket
          emptyDir: {}
        - name: docker-state
          persistentVolumeClaim:
            claimName: erun-devops-docker
      restartPolicy: Always
