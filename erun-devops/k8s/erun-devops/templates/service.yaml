apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erun-devops-home
  labels:
    app: erun-devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erun-devops-docker
  labels:
    app: erun-devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: erun-devops
  labels:
    app: erun-devops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: erun-devops
  labels:
    app: erun-devops
subjects:
  - kind: ServiceAccount
    name: erun-devops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
{{- if eq (required "environment is required" .Values.environment) "local" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: erun-devops-namespace-manager
  labels:
    app: erun-devops
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: erun-devops
  labels:
    app: erun-devops
subjects:
  - kind: ServiceAccount
    name: erun-devops
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: erun-devops-namespace-manager
  labels:
    app: erun-devops
subjects:
  - kind: ServiceAccount
    name: erun-devops
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: erun-devops-namespace-manager
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erun-devops
  labels:
    app: erun-devops
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: erun-devops
  replicas: 1
  template:
    metadata:
      labels:
        app: erun-devops
    spec:
      automountServiceAccountToken: true
      serviceAccountName: erun-devops
      securityContext:
        fsGroup: 1000
      initContainers:
        - image: tonistiigi/binfmt:qemu-v10.0.4-56
          name: install-binfmt
          imagePullPolicy: IfNotPresent
          args:
            - --install
            - amd64,arm64
          securityContext:
            privileged: true
      containers:
        - image: erunpaas/erun-devops:{{ .Chart.AppVersion }}
          name: erun-devops
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /home/erun
            - name: KUBECONFIG
              value: /home/erun/.kube/config
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: ERUN_REPO_PATH
              value: {{ printf "/home/erun/git/%s" (base (required "worktreeHostPath is required" .Values.worktreeHostPath)) | quote }}
            - name: ERUN_REPO_REMOTE
              value: "false"
            - name: ERUN_KUBERNETES_CONTEXT
              value: in-cluster
            - name: ERUN_TENANT
              value: {{ required "tenant is required" .Values.tenant | quote }}
            - name: ERUN_ENVIRONMENT
              value: {{ required "environment is required" .Values.environment | quote }}
            - name: ERUN_SSHD_ENABLED
              value: {{ if .Values.sshdEnabled }}"true"{{ else }}"false"{{ end }}
            - name: ERUN_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 2222
              name: ssh
          resources:
            limits:
              cpu: "4"
              memory: "8916Mi"
            requests:
              cpu: "0.25"
              memory: "1024Mi"
          volumeMounts:
            - name: erun-home
              mountPath: /home/erun
            - name: repo-worktree
              mountPath: {{ printf "/home/erun/git/%s" (base (required "worktreeHostPath is required" .Values.worktreeHostPath)) | quote }}
            - name: docker-socket
              mountPath: /var/run
        - image: erunpaas/erun-dind:28.1.1
          name: erun-dind
          imagePullPolicy: IfNotPresent
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - docker info >/dev/null 2>&1
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -lc
                  - while [ ! -S /var/run/docker.sock ]; do sleep 1; done; chmod 0666 /var/run/docker.sock
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-state
              mountPath: /var/lib/docker
      volumes:
        - name: erun-home
          persistentVolumeClaim:
            claimName: erun-devops-home
        - name: repo-worktree
          hostPath:
            path: {{ required "worktreeHostPath is required" .Values.worktreeHostPath | quote }}
            type: DirectoryOrCreate
        - name: docker-socket
          emptyDir: {}
        - name: docker-state
          persistentVolumeClaim:
            claimName: erun-devops-docker
      restartPolicy: Always
